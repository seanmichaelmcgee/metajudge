# MetaJudge-AGI Benchmark Configuration
# Source: SOUL.md, Recommendations memo, V1 Architecture

benchmark:
  name: "metacognition_behavioral_suite_v1"
  version: "1.0.0"
  full_name: "MetaJudge-AGI: Epistemically Robust Metacognitive Assessment"
  claim: "Measures behaviorally grounded metacognitive behavior in LLMs across epistemic monitoring and cognitive control."

# Two-axis structure (Nelson & Narens 1990)
axes:
  monitoring:
    name: "Epistemic Monitoring"
    description: "Does the model track the reliability of its own cognition?"
    families: [calibration, abstention_verification, grounding_sensitivity]
  control:
    name: "Cognitive Control / Regulation"
    description: "Does the model use monitoring information to change behavior?"
    families: [intrinsic_self_correction, evidence_assisted_correction, control_policy_adaptation]

# Family definitions
families:
  - id: calibration
    name: "Confidence Calibration"
    axis: monitoring
    turns: 1
    description: "Confidence corresponds to correctness"
    v1: true

  - id: abstention_verification
    name: "Selective Abstention / Verification"
    axis: monitoring
    turns: 1
    description: "Correct decision when uncertain"
    v1: false

  - id: grounding_sensitivity
    name: "Grounding Sensitivity"
    axis: monitoring
    turns: 1
    description: "Responds to presence/absence of supporting evidence"
    v1: false

  - id: intrinsic_self_correction
    name: "Intrinsic Self-Correction"
    axis: control
    turns: 2
    description: "Detects and repairs errors with no new evidence"
    v1: false

  - id: evidence_assisted_correction
    name: "Evidence-Assisted Correction"
    axis: control
    turns: 2
    description: "Uses external cues appropriately without blind flipping"
    v1: false

  - id: control_policy_adaptation
    name: "Control-Policy Adaptation"
    axis: control
    turns: 2
    description: "Changes behavior under task perturbation"
    v1: false

# Scoring weights (Recommendations memo §4.C)
# Monitoring-heavy: 60% monitoring, 40% control
scoring:
  weights:
    calibration: 0.30
    abstention_verification: 0.20
    intrinsic_self_correction: 0.10
    evidence_assisted_correction: 0.15
    grounding_sensitivity: 0.10
    control_policy_adaptation: 0.15

  # Design principles (Framework §7.3, preserved)
  principles:
    - "Overconfident error must hurt a lot"
    - "Appropriate abstention must help but not too much"
    - "Revision must help only when it improves performance"
    - "No single cheap behavior should dominate the benchmark"

  # Scoring fields classification
  field_policy:
    scored: "answer, confidence, decision, revised_answer, revised_confidence, evidence_mode, control_action"
    diagnostic_only: "reason_for_uncertainty, would_verify_if_possible, why_this_strategy, what_changed, suspected_error_type, abstention_reason"

# Dataset targets
dataset:
  v1_calibration_items: 117
  v1_family_b_items: 87
  full_benchmark_items: 380
  difficulty_tiers: [easy, medium, hard, deceptive, adversarial]

# Anti-gaming (preserved from original)
anti_gaming:
  countermeasures:
    - behavior_first_scoring
    - hidden_optimal_action_classes
    - prompt_format_variation
    - decoy_confidence_cues
    - symmetric_correction_setup
    - source_label_adversarial_items
    - cross_template_evaluation_splits
    - limit_reward_for_verbosity

# Key references
references:
  - "Nelson & Narens (1990) — Monitoring vs. control"
  - "Kadavath et al. (2022) — LLMs know what they know"
  - "Xiong et al. (ICLR 2024) — Verbalized confidence is overconfident"
  - "Huang et al. (ICLR 2024) — Intrinsic self-correction often fails"

seed: 42

# Model panels for evaluation sweeps
model_panels:
  smoke_flash:
    description: "Single-model quick test"
    models:
      - "google/gemini-2.5-flash"

  core_five:
    description: "Standard 5-model calibration panel"
    models:
      - "google/gemini-2.5-flash"
      - "google/gemini-2.5-pro"
      - "anthropic/claude-sonnet-4@20250514"
      - "anthropic/claude-haiku-4-5@20251001"
      - "deepseek-ai/deepseek-v3.1"

name: Claude Code Auditor

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  audit:
    # Skip audit when 'skip-audit' label is present.
    # Workflow: develop with skip-audit label on → push freely.
    # When ready for review: remove skip-audit, add 'run-audit' label → single run.
    # On 'opened': always run (first push). On 'synchronize': skip if skip-audit.
    # On 'labeled' with 'run-audit': always run (manual trigger).
    if: |
      (github.event.action == 'opened') ||
      (github.event.action == 'labeled' && github.event.label.name == 'run-audit') ||
      (github.event.action == 'synchronize' && !contains(github.event.pull_request.labels.*.name, 'skip-audit'))
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Collect audit context
        run: |
          git diff origin/main...HEAD > /tmp/diff.txt
          {
            echo "--- RUFF OUTPUT ---"
            ruff check . 2>&1 || true
            echo ""
            echo "--- MYPY OUTPUT ---"
            mypy metajudge/ --ignore-missing-imports 2>&1 || true
            echo ""
            echo "--- TEST OUTPUT ---"
            pytest tests/ --tb=short -q 2>&1 || true
            echo ""
            echo "--- DATASET VALIDATION ---"
            python -m metajudge.validation.run_checks 2>&1 || true
          } > /tmp/context.txt
          {
            echo "=== GIT DIFF vs main ==="
            cat /tmp/diff.txt
            echo ""
            echo "=== TOOL OUTPUT ==="
            cat /tmp/context.txt
          } > audit-context.txt
          echo "audit-context.txt is $(wc -c < audit-context.txt) bytes"

      - uses: anthropics/claude-code-action@v1
        id: claude-audit
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          show_full_output: true
          prompt: |
            You are an independent auditor for the MetaJudge-AGI project — a Kaggle benchmark
            for measuring metacognitive behavior in LLMs. Changes were made by an agentic team.
            Your job is to audit those changes against the project's governing rules.

            First, read SOUL.md in the repo root — it contains non-negotiable project rules.
            Then read audit-context.txt — it contains the git diff, ruff/mypy/pytest output,
            and dataset validation output (PASS/WARN/FAIL findings from run_checks.py).

            Audit against these four priorities, in order:

            ## 1. SOUL.md Constraint Violations
            Check the "What agents must not do" section in SOUL.md. Flag any violation:
            - New families added that aren't A-E
            - Narrative fields (reason_for_uncertainty, why_this_strategy, what_changed) being scored
            - Dataset scope expanded beyond current phase
            - Quota-spending code added without clear justification
            - Silent divergence from SOUL.md without explicit flagging

            ## 2. Test Coverage
            New scoring logic in metajudge/ must have corresponding tests in tests/.
            Flag any new scoring functions, Brier calculations, or adjudication logic
            that has no test coverage.

            ## 3. Code Quality
            Report any ruff or mypy errors from the tool output in audit-context.txt.
            Flag: missing type hints on public functions, silent exception handling,
            hardcoded magic numbers in scoring weights (should reference config/),
            or notebook logic that belongs in metajudge/ instead.

            ## 4. Dataset Integrity
            Review the DATASET VALIDATION section in audit-context.txt.
            Flag any FAIL-level findings — these mean adjudication is broken on production data.
            Note WARN-level findings (thin aliases, difficulty gaps, redundant aliases) as
            data hygiene issues for the next sprint. If validation output is missing entirely,
            flag that the validator could not run.

            ## 5. Kaggle Quota / Budget
            Flag any code that could make unexpected API calls or spend quota:
            - Loops over model calls without caching checks
            - Missing budget guards
            - Anything that could exceed $50/day or $500 total

            Format your response as a GitHub PR comment with exactly these headers:
            ### 🚨 SOUL.md Violations
            ### 🧪 Missing Test Coverage
            ### 🔧 Code Quality
            ### 📊 Dataset Integrity
            ### 💸 Quota / Budget Risk
            ### ✅ Looks Good

            Under each header, number your findings. If nothing to flag, write "None."
            Be specific: include file names and line numbers where possible.

      - name: Post audit comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract Claude's result from the execution log
          RESULT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$RESULT_FILE" ]; then
            # Extract the result text from the JSON
            AUDIT_COMMENT=$(python3 -c "
          import json
          with open('$RESULT_FILE') as f:
              data = json.load(f)
          # Top level may be a list or a dict
          if isinstance(data, list):
              data = data[-1] if data else {}
          # Try result field first
          result = data.get('result', '')
          if result:
              print(result)
          else:
              for msg in reversed(data.get('messages', [])):
                  if isinstance(msg, dict) and msg.get('role') == 'assistant':
                      for block in msg.get('content', []):
                          if isinstance(block, dict) and block.get('type') == 'text':
                              print(block['text'])
                              exit()
          ")
            if [ -n "$AUDIT_COMMENT" ]; then
              echo "Posting audit comment to PR..."
              gh pr comment ${{ github.event.pull_request.number }} --body "$AUDIT_COMMENT"
            else
              echo "No audit result found in execution output"
            fi
          else
            echo "Claude execution output file not found"
          fi

      - name: Save audit log
        if: always()
        run: |
          mkdir -p audit-logs
          RESULT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$RESULT_FILE" ]; then
            python3 -c "
          import json, datetime
          with open('$RESULT_FILE') as f:
              data = json.load(f)
          if isinstance(data, list):
              data = data[-1] if data else {}
          log_entry = {
              'timestamp': datetime.datetime.utcnow().isoformat(),
              'pr': ${{ github.event.pull_request.number }},
              'branch': '${{ github.head_ref }}',
              'cost_usd': data.get('total_cost_usd', 0),
              'num_turns': data.get('num_turns', 0),
              'result': data.get('result', '')[:500],
              'success': data.get('subtype') == 'success'
          }
          print(json.dumps(log_entry, indent=2))
          " | tee audit-logs/latest.json
          fi
